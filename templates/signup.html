<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Signup</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <style>
        body {
            background-color: #f7f7f7;
            font-family: Arial;
        }

        form {
            width: 300px;
            padding: 20px;
            background: white;
            margin: auto;
            border: 2px solid black;
            border-radius: 10px;
            padding: 70px 50px;
        }

        input {
            width: 100%;
            padding: 10px;
        }
    </style>
</head>
<body>

    <form id="signupForm">
        <input type="hidden" id="csrf" value="{{ csrf_token }}">
        
        <h2>Create New Account</h2>

        <label for="username">Enter Username:</label>
        <br>
        <input type="text" name="username" placeholder="Username" required>
        <br><br>

        <label for="password">Enter Password:</label>
        <br>
        <input type="password" name="password" placeholder="Password" required>
        <br><br>

        <label for="role">Select Role:</label>
        <select name="role" required>
            <option value="customer">customer</option>
            <option value="admin">admin</option>
        </select>
        <br><br>

        <button id="btn" type="submit">Signup</button>
    </form>

    <p style="color:red" id="error"></p>

    <script>
        let btn = document.getElementById("btn");
        let form = document.getElementById("signupForm");

        btn.addEventListener('click', async function(e) {
            e.preventDefault();

            let csrfToken = document.getElementById("csrf").value;
            let formData = new FormData(form); 

            let res = await fetch("http://127.0.0.1:8000/signup/", {
                method: "POST",
                headers: {
                    "X-CSRFToken": csrfToken
                },
                body: formData
            });

            let data = await res.json();

            if (res.ok) {
                alert("User created. Go to login.");
                window.location.href = "http://127.0.0.1:8000/login/";
            } else {
                document.getElementById("error").innerText = JSON.stringify(data);
            }
        });

        
    </script>

</body>
</html>
