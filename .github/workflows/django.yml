name: Build and Push Django Docker Image

on:
  push:
    branches: [ main ]

jobs:
  docker:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        run: docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
  
      - name: Remove Buildx cache
        run: docker builder prune -af
        
      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/django-backend:latest .

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/django-backend:latest

      - name: Deploy to Minikube
        run: |
          kubectl apply -f app_deployment.yaml
          kubectl rollout restart deployment django-deployment
          kubectl apply -f service.yaml
          kubectl apply -f service__monitor.yaml
