name: Build and Push Django Docker Image

on:
  push:
    branches: [ main ]

jobs:
  docker:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        run: docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
  
      - name: Remove Buildx cache
        run: docker builder prune -af
        
      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/django-backend:latest .

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/django-backend:latest

       - name: Update deployment file
        run: |
          sed -i "s|image: .*|image: ${{ secrets.DOCKERHUB_USERNAME }}/django-backend:${{ github.sha }}|" app_deployment.yaml

      - name: Commit and push
        run: |
          git config user.name "Mohammad Mudassar"
          git config user.email "mudassirishaq8@gmail.com"
          git add app_deployment.yaml
          git commit -m "Update image"
          git push